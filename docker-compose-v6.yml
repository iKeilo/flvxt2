services:
  backend:
    image: ghcr.io/abai569/flvx-svc-backend:${FLUX_VERSION:-latest}
    container_name: flvx-svc-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      DB_TYPE: ${DB_TYPE:-sqlite}
      DB_PATH: /app/data/gost.db
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_ADDR: :6365
      TZ: Asia/Shanghai
      FLUX_VERSION: ${FLUX_VERSION:-dev}
      PANEL_DEPLOY_DIR: /opt/flvx-svc
      PANEL_BACKEND_CONTAINER: flvx-svc-backend
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL}
      LICENSE_KEY: ${LICENSE_KEY}
      SERVER_DOMAIN: ${SERVER_DOMAIN}
      HMAC_SECRET_KEY: ${HMAC_SECRET_KEY:-flvx_455f08ea-ce13-46d4-8574-ebd2a9d0e853}
    ports:
      - "${BACKEND_PORT}:6365"
    volumes:
      - sqlite_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/flvx-svc:/opt/flvx-svc
    networks:
      - gost-network
    stop_grace_period: 30s
    stop_signal: SIGTERM
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:6365/flow/test || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: flvx-svc-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flvx_svc}
      POSTGRES_USER: ${POSTGRES_USER:-flvx_svc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flvx_svc_change_me}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gost-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flvx_svc} -d ${POSTGRES_DB:-flvx_svc}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    image: ghcr.io/abai569/flvx-svc-frontend:${FLUX_VERSION:-latest}
    container_name: flvx-svc-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gost-network


volumes:
  sqlite_data:
    driver: local
  postgres_data:
    name: postgres_data
    driver: local


networks:
  gost-network:
    driver: bridge
    enable_ipv6: true
